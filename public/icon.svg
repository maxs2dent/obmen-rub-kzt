<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: black; }
      .circle1 { fill: #4B57B5; }
      .circle2 { fill: #4CAF50; }
      .symbol1 { fill: #E8DD8F; }
      .symbol2 { fill: #E6E6E6; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: white; }
      .circle1 { fill: #4B57B5; }
      .circle2 { fill: #4CAF50; }
      .symbol1 { fill: #E8DD8F; }
      .symbol2 { fill: #E6E6E6; }
    }
  </style>

  <g clip-path="url(#clip0_1)">
    <rect class="background" width="180" height="180" rx="37" />

    <g style="transform: scale(95%); transform-origin: center">

      <!-- Синий задний круг -->
      <circle cx="75" cy="75" r="65" class="circle1"/>

      <!-- Зеленый передний круг -->
      <circle cx="115" cy="115" r="65" class="circle2"/>

      <!-- Евро -->
      <text x="75" y="100"
            text-anchor="middle"
            font-size="70"
            font-weight="bold"
            font-family="Arial, Helvetica, sans-serif"
            class="symbol1">€</text>

      <!-- Доллар -->
      <text x="115" y="140"
            text-anchor="middle"
            font-size="70"
            font-weight="bold"
            font-family="Arial, Helvetica, sans-serif"
            class="symbol2">$</text>

    </g>
  </g>

  <defs>
    <clipPath id="clip0_1">
      <rect width="180" height="180" fill="white" />
    </clipPath>
  </defs>
</svg>
